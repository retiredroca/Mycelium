name: Build on demand

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    if: |
      (github.event_name == 'push' &&
       (contains(github.event.head_commit.message, 'buildRC') ||
        contains(github.event.head_commit.message, 'buildRelease'))) ||
      (github.event_name == 'pull_request' &&
       (contains(github.event.pull_request.title, 'buildRC') ||
        contains(github.event.pull_request.title, 'buildRelease') ||
        contains(github.event.pull_request.body, 'buildRC') ||
        contains(github.event.pull_request.body, 'buildRelease')))

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        include:
          - os: windows-latest
            cpp_compiler: cl
          - os: ubuntu-latest
            cpp_compiler: g++

    steps:
    - uses: actions/checkout@v4

    - name: Compute version
      id: ver
      shell: bash
      run: |
        YY=$(date +%y)
        DOW=$(date +%w)
        WN=$(date +%V)
        echo "version=0.1.$YY.$DOW.$WN" >> "$GITHUB_OUTPUT"
        echo "Building version: 0.1.$YY.$DOW.$WN"

    - name: Configure CMake
      run: >
        cmake -B ${{ github.workspace }}/build
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DMYCELIUM_BUILD_VERSION=${{ steps.ver.outputs.version }}
        -S ${{ github.workspace }}/mycelium-cpp

    - name: Build
      run: cmake --build ${{ github.workspace }}/build --config ${{ matrix.build_type }}
